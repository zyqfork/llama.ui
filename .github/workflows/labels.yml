name: Update labels

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/labels.yml"

jobs:
    create-labels:
        runs-on: ubuntu-latest
        permissions:
            issues: write
        env:
            LABELS_JSON: |
                [
                  {"name": "bug",           "color": "d73a4a", "description": "Something isn't working"},
                  {"name": "feature",       "color": "a2eeef", "description": "New functionality or enhancement"},
                  {"name": "refactor",      "color": "d4c5f9", "description": "Code improvements (no logic change)"},
                  {"name": "chore",         "color": "ededed", "description": "Maintenance, dependencies, config"},
                  {"name": "docs",          "color": "0075ca", "description": "Documentation changes"},
                  {"name": "security",      "color": "e99695", "description": "Security updates"},

                  {"name": "P0",            "color": "ff0000", "description": "Critical - data loss, security, crash loop, or release blocker"},
                  {"name": "P1",            "color": "d93f0b", "description": "High - major functionality broken with no clear workaround"},
                  {"name": "P2",            "color": "fbca04", "description": "Medium - degraded behavior where a workaround exists"},
                  {"name": "P3",            "color": "0e8a16", "description": "Low - cosmetic, cleanup, or nice-to-have improvement"},

                  {"name": "needs-triage",  "color": "d876e3", "description": "Not yet categorized"},
                  {"name": "needs-repro",   "color": "e4b8f0", "description": "Bug needs reproduction steps"},

                  {"name": "blocked",       "color": "f97316", "description": "Waiting on external dependency or decision"},
                  {"name": "declined",      "color": "e6e6e6", "description": "Will not be implemented"},
                  {"name": "stale",         "color": "848d97", "description": "No activity, may auto-close"},
                  {"name": "help-wanted",   "color": "008672", "description": "Open for contributors"}
                ]
        steps:
            - uses: actions/github-script@v7
              with:
                  script: |
                      const labels = JSON.parse(process.env.LABELS_JSON);
                      for (const label of labels) {
                        try {
                          await github.rest.issues.createLabel({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            name: label.name,
                            description: label.description || '',
                            color: label.color
                          });
                          console.log(`Created label '${label.name}'`);
                        } catch (error) {
                          if (error.status === 422) {
                            await github.rest.issues.updateLabel({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              name: label.name,
                              description: label.description || '',
                              color: label.color
                            });
                            console.log(`Updated label '${label.name}'`);
                          } else {
                            console.error(`Error processing label '${label.name}': ${error}`);
                          }
                        }
                      }
